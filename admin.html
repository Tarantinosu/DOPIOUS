<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>DOPIOUS+ Admin | Projects</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
:root{--r:#ff2a14;--bg:#050505;--panel:#0e0e0e;--line:rgba(255,255,255,.14);--muted:rgba(255,255,255,.58)}
*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:#fff;font-family:Arial,'Noto Sans Thai',sans-serif;-webkit-text-size-adjust:100%}button,input,select,textarea{font:inherit}button{cursor:pointer}a{color:inherit;text-decoration:none}
.top{position:sticky;top:0;z-index:10;background:#050505;border-bottom:1px solid var(--line);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 18px}.logo{font-size:24px;font-weight:950;letter-spacing:-.06em}.logo span{color:var(--r)}.top small{color:var(--muted);font-size:12px}
.wrap{display:grid;grid-template-columns:320px 1fr;gap:18px;padding:18px;max-width:1220px;margin:0 auto}.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}.panel h2{margin:0 0 12px;font-size:18px}.hint{font-size:12px;line-height:1.45;color:var(--muted);margin-bottom:14px}.list{display:grid;gap:8px;max-height:calc(100dvh - 150px);overflow:auto}.item{border:1px solid var(--line);border-radius:10px;background:#111;padding:10px;text-align:left;color:#fff}.item b{display:block;font-size:14px}.item span{display:block;margin-top:4px;color:var(--muted);font-size:12px;line-height:1.35}.item.on{border-color:var(--r)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.wide{grid-column:1/-1}label{display:block;color:rgba(255,255,255,.75);font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}input,select,textarea{width:100%;margin-top:7px;background:#080808;color:#fff;border:1px solid var(--line);border-radius:10px;padding:13px 12px;outline:none}textarea{min-height:92px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:var(--r)}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.btn{border:0;border-radius:10px;padding:13px 16px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;background:var(--r);color:#fff}.btn.ghost{background:#171717;border:1px solid var(--line);color:#fff}.btn.danger{background:#2a0806;color:#ffb3ad;border:1px solid rgba(255,42,20,.4)}.status{min-height:22px;margin-top:10px;color:var(--muted);font-size:13px}.login{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px}.login .panel{width:min(420px,94vw)}.hidden{display:none!important}
@media(max-width:860px){.wrap{grid-template-columns:1fr;padding:12px}.grid{grid-template-columns:1fr}.wide{grid-column:auto}.list{max-height:260px}.top{padding:0 12px}}
</style>
<script>
(function(){
  function l2(){var s=document.createElement('script');s.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js';s.onload=boot;document.head.appendChild(s)}
  function l1(){var s=document.createElement('script');s.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js';s.onload=l2;document.head.appendChild(s)}
  document.readyState==='loading'?document.addEventListener('DOMContentLoaded',l1):l1();
})();
</script>
</head>
<body>
<div id="login" class="login hidden"><div class="panel"><h2>DOPIOUS+ Admin</h2><div class="hint">กรอกรหัสเพื่อเข้า Project Data Entry</div><input id="pw" type="text" placeholder="Password" onkeydown="if(event.key==='Enter')checkLogin()"><div class="actions"><button class="btn" onclick="checkLogin()">Enter</button></div><div id="loginStatus" class="status"></div></div></div>
<div id="admin" class="hidden">
  <div class="top"><div class="logo">Dopious<span>+</span> Admin</div><small>Project Data Entry Only</small></div>
  <div class="wrap">
    <aside class="panel"><h2>Projects</h2><div class="hint">เลือกโปรเจกต์เพื่อแก้ไข หรือกด Add New</div><div class="actions" style="margin-top:0;margin-bottom:12px"><button class="btn ghost" onclick="newProject()">Add New</button><button class="btn ghost" onclick="loadProjects()">Refresh</button></div><div id="projectList" class="list"></div></aside>
    <main class="panel"><h2 id="formTitle">Add Project</h2><div class="hint">1 Project = 1 Head + 1 Sub Head / 1 Card = 1 Head + 1 Sub Head</div>
      <div class="grid">
        <label class="wide">Project Name<input id="name" autocomplete="off"></label>
        <label>Client<input id="client" autocomplete="off"></label>
        <label>Year<input id="year" value="2026" inputmode="numeric"></label>
        <label>Service Head<select id="service" onchange="updateSubOptions()"></select></label>
        <label>Sub Head<select id="subHead"></select></label>
        <label class="wide">Cover Image URL<input id="cover" placeholder="https://..."></label>
        <label class="wide">Gallery Image URLs<textarea id="gallery" placeholder="1 URL ต่อ 1 บรรทัด"></textarea></label>
        <label class="wide">Video URL<textarea id="video" style="min-height:50px" placeholder="https://... ถ้ามี"></textarea></label>
        <label class="wide">Description<textarea id="desc" placeholder="รายละเอียดงาน ถ้ามี"></textarea></label>
      </div>
      <div class="actions"><button class="btn" onclick="saveProject()">Save Project</button><button class="btn danger" onclick="deleteProject()">Delete</button><button class="btn ghost" onclick="newProject()">Clear</button></div>
      <div id="status" class="status"></div>
    </main>
  </div>
</div>
<script>
const FB={apiKey:"AIzaSyC3JxU94Zb4G1DmDAA7TeiLAkJ4uxrVh5g",authDomain:"dopious-c7230.firebaseapp.com",projectId:"dopious-c7230",storageBucket:"dopious-c7230.firebasestorage.app",messagingSenderId:"424557490629",appId:"1:424557490629:web:ae5181dc91bbac2b8f1bac"};
const COL='dopious_cms'; let db=null, projects=[], editingId=null;
const TAXONOMY=[
 {service:'Space Design+',subs:['Retail','Commercial','Residential','Office','Exhibition','Event','Kiosk','Pop-up Store','VM / Display','Window Display','Art Installation']},
 {service:'Sculpture Design+',subs:['Sculpture','Art Installation','Public Art','Character Sculpture','Decorative Object','Landmark','3D Art Form','Spatial Art','Fabrication Concept']},
 {service:'Visual Production+',subs:['Storyboard','Animatic','Motion Graphic','2D Animation','3D Animation','2D Visualization','3D Visualization','3D Composite','Visual Effects','LED Screen','Product Animation','VDO Production','Photo Production','Ads Production','Post Production','Shot Direction','Brand Film']},
 {service:'Graphic Design+',subs:['Graphic','Illustration','Layout','Poster','Social Media','Print','Typography','Signage','Presentation','Visual System','Packaging Graphic','Label','Box Artwork','Infographic','Icon','Character Graphic','Pattern','Menu','Brochure','Catalogue','Key Art']},
 {service:'Branding Design+',subs:['Brand Strategy','Brand Story','Logo','Visual Identity','Brand Guideline','Campaign Identity','Art Direction','Naming','Mood & Tone','Brand Communication']},
 {service:'Key Visual Design+',subs:['Key Visual','Campaign Visual','Ads','Art Direction','Advertising Direction','Promotion Visual','Social Media','Launch Campaign','Seasonal Campaign','Storyboard','Visual Storytelling']},
 {service:'Build & Install+',subs:['Booth Production','Display Production','Event Production','Fabrication','On-site Installation','Site Supervision','Material Execution','Supplier Coordination','Quality Control','Final Delivery']},
 {service:'Production Sourcing+',subs:['Product Sourcing','Supplier Coordination','Factory Follow-up','Sample Development','Material Sourcing','Production Control','Quality Check','Final Delivery','Premium Gift','Merchandise','Corporate Gift']},
 {service:'Industrial Design+',subs:['Product','Product Concept','CMF','Form','User Experience','Prototype','Product Visualization','Packaging Structure','Material','Manufacturing','Premium Product','Merchandise','Corporate Gift']},
 {service:'Corporate Design+',subs:['Corporate Identity','Brand System','Company Profile','Presentation','Stationery','Corporate Graphic','Visual System','Office Collateral','Business Document']},
 {service:'Digital Design+',subs:['Website','UX-UI','Landing Page','Web Experience','Interface','Digital Branding','Mobile Experience','User Journey','Conversion','Portfolio Website','Service Website']},
 {service:'Fashion Design+',subs:['Fashion','Costume','Uniform','Styling Direction','Fashion Concept','Textile Direction','Character Styling','Campaign Styling','Showpiece']},
 {service:'Creative Consultation+',subs:['Creative Brief','Concept Direction','Design Direction','Budget Planning','Scope Planning','Material Consulting','Production Consulting','Supplier Consulting','Campaign Consulting','Brand Consulting','Space Consulting','Product Consulting']}
];
function boot(){try{if(!firebase.apps.length)firebase.initializeApp(FB);db=firebase.firestore();init()}catch(e){document.body.innerHTML='Firebase error: '+e.message}}
function init(){fillService(); if(new URLSearchParams(location.search).get('admin')==='1'){showAdmin()}else{document.getElementById('login').classList.remove('hidden')}}
function checkLogin(){const v=document.getElementById('pw').value.trim(); if(v==='dopious123'||v==='dopious2026'){showAdmin()}else document.getElementById('loginStatus').textContent='รหัสไม่ถูกต้อง'}
function showAdmin(){document.getElementById('login').classList.add('hidden');document.getElementById('admin').classList.remove('hidden');loadProjects()}
function fillService(){const el=document.getElementById('service');el.innerHTML=TAXONOMY.map(x=>'<option value="'+esc(x.service)+'">'+esc(x.service)+'</option>').join('');updateSubOptions()}
function updateSubOptions(selected){const svc=document.getElementById('service').value;const meta=TAXONOMY.find(x=>x.service===svc)||TAXONOMY[0];const el=document.getElementById('subHead');el.innerHTML=meta.subs.map(x=>'<option value="'+esc(x)+'">'+esc(x)+'</option>').join('');if(selected&&meta.subs.includes(selected))el.value=selected}
function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function lines(v){return String(v||'').split(/\n+/).map(s=>s.trim()).filter(Boolean)}
function normalizeDoc(d){const sub=Array.isArray(d.subHeads)&&d.subHeads.length?d.subHeads[0]:(d.subHead||d.sub||d.subHeadline||'General');return {...d,subHead:sub||'General',service:d.service||d.svc||'Creative Consultation+'}}
async function loadProjects(){if(!db)return;setStatus('Loading...');const snap=await db.collection(COL).orderBy('ts','desc').get().catch(async()=>db.collection(COL).get());projects=snap.docs.map(doc=>({docId:doc.id,...normalizeDoc(doc.data())})).filter(p=>(p.name||p.nm||p.title)&&!p.value);renderList();setStatus(projects.length+' projects')}
function renderList(){const el=document.getElementById('projectList');el.innerHTML=projects.map(p=>'<button class="item '+(p.docId===editingId?'on':'')+'" onclick="editProject(\''+p.docId+'\')"><b>'+esc(p.name||p.nm||p.title)+'</b><span>'+esc(p.service)+' / '+esc(p.subHead||p.sub||'General')+'</span></button>').join('')||'<div class="hint">No projects yet.</div>'}
function editProject(id){const p=projects.find(x=>x.docId===id);if(!p)return;editingId=id;document.getElementById('formTitle').textContent='Edit Project';document.getElementById('name').value=p.name||p.nm||p.title||'';document.getElementById('client').value=p.client||p.cl||'';document.getElementById('year').value=p.year||p.yr||'2026';document.getElementById('service').value=TAXONOMY.some(x=>x.service===p.service)?p.service:TAXONOMY[0].service;updateSubOptions(p.subHead||p.sub||'General');document.getElementById('cover').value=p.coverImage||p.cover||p.covUrl||'';document.getElementById('gallery').value=(p.galleryImages||p.gallery||[]).join('\n');document.getElementById('video').value=p.videoUrl||p.vurl||'';document.getElementById('desc').value=p.desc||p.ds||p.description||'';renderList();window.scrollTo({top:0,behavior:'smooth'})}
function newProject(){editingId=null;document.getElementById('formTitle').textContent='Add Project';['name','client','cover','gallery','video','desc'].forEach(id=>document.getElementById(id).value='');document.getElementById('year').value='2026';document.getElementById('service').value=TAXONOMY[0].service;updateSubOptions();renderList();setStatus('')}
async function saveProject(){const name=document.getElementById('name').value.trim();const cover=document.getElementById('cover').value.trim();if(!name){setStatus('ใส่ Project Name ก่อน');return}if(!cover){setStatus('ใส่ Cover Image URL ก่อน');return}const svc=document.getElementById('service').value;const sub=document.getElementById('subHead').value||'General';const gallery=lines(document.getElementById('gallery').value);const video=document.getElementById('video').value.trim();const desc=document.getElementById('desc').value.trim();const now=new Date().toISOString();const data={name,nm:name,client:document.getElementById('client').value.trim(),cl:document.getElementById('client').value.trim(),year:document.getElementById('year').value.trim()||'2026',yr:document.getElementById('year').value.trim()||'2026',service:svc,svc:svc,subHead:sub,sub:sub,subHeads:[sub],subHeadline:sub,coverImage:cover,cover:cover,covUrl:cover,galleryImages:gallery,gallery:gallery,videoUrl:video,vurl:video,desc:desc,ds:desc,updatedAt:now,ts:firebase.firestore.FieldValue.serverTimestamp()};setStatus('Saving...');if(editingId)await db.collection(COL).doc(editingId).set(data,{merge:true});else await db.collection(COL).add({...data,id:'proj_'+Date.now(),createdAt:now});await loadProjects();setStatus('Saved')}
async function deleteProject(){if(!editingId){setStatus('เลือก Project ที่จะลบก่อน');return}if(!confirm('Delete this project?'))return;await db.collection(COL).doc(editingId).delete();newProject();await loadProjects();setStatus('Deleted')}
function setStatus(t){document.getElementById('status').textContent=t||''}
</script>
</body>
</html>
